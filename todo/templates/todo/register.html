<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%237c6bff'>✦</text></svg>"/>
  <title>Register — TaskFlow Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0f;--card:#16161f;--surface:#111118;--border:#ffffff0f;--accent:#7c6bff;--accent2:#5fffd4;--text:#f0f0ff;--muted:#7070a0;--danger:#ff4d6d}
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
    .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
    .orb1{width:min(400px,80vw);height:min(400px,80vw);background:#5fffd411;top:-100px;right:-100px;animation:drift 8s ease-in-out infinite}
    .orb2{width:min(350px,70vw);height:min(350px,70vw);background:#7c6bff22;bottom:-100px;left:-100px;animation:drift 8s ease-in-out infinite 4s}
    @keyframes drift{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px)}}
    .wrap{position:relative;z-index:1;width:100%;max-width:440px;padding:0.5rem}
    .brand{text-align:center;margin-bottom:1.75rem}
    .logo{display:inline-flex;align-items:center;justify-content:center;width:clamp(48px,10vw,56px);height:clamp(48px,10vw,56px);background:linear-gradient(135deg,var(--accent2),var(--accent));border-radius:14px;font-size:clamp(1.4rem,4vw,1.75rem);margin-bottom:.6rem;box-shadow:0 0 40px #5fffd422}
    .brand h1{font-family:'Syne',sans-serif;font-size:clamp(1.3rem,5vw,1.6rem);font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .brand p{color:var(--muted);font-size:.8rem}
    .card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:clamp(1.5rem,5vw,2.5rem);box-shadow:0 20px 60px #00000066}
    .card h2{font-family:'Syne',sans-serif;font-size:clamp(1.1rem,4vw,1.3rem);font-weight:700;margin-bottom:.2rem}
    .sub{color:var(--muted);font-size:.875rem;margin-bottom:1.75rem}
    .alert{background:#ff4d6d18;border:1px solid #ff4d6d33;color:var(--danger);padding:.75rem 1rem;border-radius:10px;font-size:.875rem;margin-bottom:1rem}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
    @media(max-width:400px){.row{grid-template-columns:1fr}}
    .fg{margin-bottom:1rem}
    label{display:block;font-size:.75rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem}
    input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:.8rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:clamp(0.85rem,3vw,0.92rem);outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
    input:focus{border-color:var(--accent2);box-shadow:0 0 0 3px #5fffd422}
    input::placeholder{color:var(--muted)}
    .btn{width:100%;padding:.875rem;background:linear-gradient(135deg,var(--accent2),#40e0b0);border:none;border-radius:12px;color:#0a0a0f;font-family:'Syne',sans-serif;font-size:clamp(0.9rem,3vw,1rem);font-weight:800;cursor:pointer;margin-top:.5rem;box-shadow:0 4px 20px #5fffd444;transition:transform .15s;-webkit-tap-highlight-color:transparent}
    .btn:hover{transform:translateY(-1px)}
    .btn:active{transform:translateY(0)}
    .divider{text-align:center;color:var(--muted);font-size:.8rem;margin:1.25rem 0;position:relative}
    .divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border)}
    .divider::before{left:0}.divider::after{right:0}
    .link{text-align:center;font-size:.875rem;color:var(--muted)}
    .link a{color:var(--accent2);text-decoration:none;font-weight:500}
    .link a:hover{text-decoration:underline}
    .foot{text-align:center;margin-top:1.5rem;color:var(--muted);font-size:.75rem}
    .foot span{color:var(--accent)}
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="wrap">
    <div class="brand">
      <div class="logo">✦</div>
      <h1>TaskFlow Pro</h1>
      <p>by Agha Wafa Abbas</p>
    </div>
    <div class="card">
      <h2>Create account</h2>
      <p class="sub">Start managing tasks professionally</p>
      {% if messages %}
        {% for msg in messages %}<div class="alert">{{ msg }}</div>{% endfor %}
      {% endif %}
      <form method="POST">
        {% csrf_token %}
        <div class="fg">
          <label>Username</label>
          <input type="text" name="username" placeholder="Choose a username" required autofocus autocomplete="username"/>
        </div>
        <div class="fg">
          <label>Email</label>
          <input type="email" name="email" placeholder="your@email.com" autocomplete="email"/>
        </div>
        <div class="row">
          <div class="fg">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required autocomplete="new-password"/>
          </div>
          <div class="fg">
            <label>Confirm</label>
            <input type="password" name="confirm_password" placeholder="••••••••" required autocomplete="new-password"/>
          </div>
        </div>
        <button type="submit" class="btn">Create Account →</button>
      </form>
      <div class="divider">or</div>
      <div class="link">Already registered? <a href="{% url 'login' %}">Sign in</a></div>
    </div>
    <div class="foot">TaskFlow Pro · <span>by Agha Wafa Abbas</span></div>
  </div>
</body>
</html>
